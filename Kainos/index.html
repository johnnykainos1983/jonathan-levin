<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAINOS | new of a different kind</title>
    <!-- Google Fonts: Montserrat (Bold) & Inter (Subtext) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- Gravity-Defying Header -->
    <header class="hero-section">
        <div class="hero-content">
            <div class="abstract-crown">
                <div class="chevron"></div>
                <div class="chevron right"></div>
            </div>
            <h1 class="brand-title">KAINOS</h1>
            <p class="tagline">new of a different kind.</p>
            <a href="#collection" class="btn-primary">ENTER THE VOID</a>
        </div>
        <div class="scroll-indicator">
            <span>SCROLL</span>
            <div class="line"></div>
        </div>
    </header>

    <!-- Collection Section (T-shirt Placeholders) -->
    <section id="collection" class="collection-section">
        <div class="section-header fade-up">
            <h2>01 // EXOSUIT COLLECTION</h2>
            <div class="separator-line"></div>
        </div>

        <div class="product-grid">
            <!-- Product 1 -->
            <div class="product-card fade-up">
                <div class="product-image-container">
                    <!-- Placeholder logic: the image floats with zero-g physics in JS -->
                    <img src="kainos_tee_1_1773130504386.png" alt="Kainos Zero-G Tee"
                        class="product-asset zero-g-float" />
                </div>
                <div class="product-details">
                    <h3>OBSIDIAN SENTINEL TEE</h3>
                    <p class="product-price">$ 85.00 USD</p>
                    <button class="btn-outline">ACQUIRE</button>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card fade-up" style="transition-delay: 0.1s;">
                <div class="product-image-container">
                    <img src="kainos_tee_2_1773130519302.png" alt="Kainos Electric Longsleeve"
                        class="product-asset zero-g-float p-delay-1" />
                </div>
                <div class="product-details">
                    <h3>ELECTRIC HORIZON L/S</h3>
                    <p class="product-price">$ 110.00 USD</p>
                    <button class="btn-outline">ACQUIRE</button>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card fade-up" style="transition-delay: 0.2s;">
                <div class="product-image-container">
                    <img src="kainos_tee_3_1773130536172.png" alt="Kainos Heavyweight Hoodie"
                        class="product-asset zero-g-float p-delay-2" />
                </div>
                <div class="product-details">
                    <h3>KAINOS HEAVYWEIGHT HOODIE</h3>
                    <p class="product-price">$ 145.00 USD</p>
                    <button class="btn-outline">ACQUIRE</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="kainos-footer fade-up">
        <h2 class="brand-title small">KAINOS</h2>
        <p class="tagline small">© 2026. A NEW OF A DIFFERENT KIND.</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
